name: Build and Push FastAPI Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub using access token
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image with commit tag
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-argocd-app:${{ github.sha }} .

      - name: Build Docker image with latest tag
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-argocd-app:latest .

      - name: Push commit-tagged image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-argocd-app:${{ github.sha }}

      - name: Push latest image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-argocd-app:latest